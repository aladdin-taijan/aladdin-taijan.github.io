baseURL: https://aladdintaijan.me/
languageCode: en-us
title: Aladdin Taijan
multilanguage: true

module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: ./node_modules/flag-icon-css/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts


languages:
  en:
    languageCode: en-US
    languageName: English
    title: Aladdin Taijan 
    weight: 1
  ar:
    languageCode: ar
    languageName: العربية
    title: علاء الدين طيجن
    weight: 2
# default language for the content
defaultContentLanguage: en

# At least HTML and JSON are required for the main HTML content and
# client-side JavaScript search
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  # Background image of the landing page
  background: /images/default-hero.png

  # Provide logos for your site. The inverted logo will be used in the initial
  # transparent navbar and the main logo will be used in the non-transparent navbar.
  logo:
    main: /images/main-logo.png
    inverted: /images/inverted-logo.png
    favicon: /images/favicon.png

 # Configure the number of section title visible in the top navbar
  topNavbar:
    maxVisibleSections: 3

  # Configure various features of this theme
  features:

    # Enable dark theme
    darkMode:
      enable: true

    # Enable and configure portfolio
    portfolio:
      enable: true

# a summary about you
summary: 'DevOps-focused System Administrator transitioning into Cloud & Automation. I manage on-prem virtualized environments using Proxmox and LXC, and I actively develop DevOps practices around CI/CD, AWS infrastructure, and automation.
My hands-on work includes infrastructure provisioning with Terraform, containerization with Docker, CI/CD pipelines using Jenkins, and foundational Kubernetes labs.
I learn by building, breaking, and improving systems through real labs and personal projects.'

